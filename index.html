<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blom-AI Detektor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f8f9fa; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.5rem; }
        #status { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        #image-preview { max-width: 100%; border-radius: 10px; margin: 20px 0; display: none; border: 3px solid #eee; }
        .result-area { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; transition: all 0.3s; }
        .saker { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .osaker { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .label-name { font-size: 1.4rem; font-weight: bold; display: block; }
        .confidence-val { font-size: 1rem; opacity: 0.8; }
        input[type="file"] { margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Blom-igenkänning</h1>
    <div id="status">Förbereder AI...</div>
    
    <input type="file" id="image-upload" accept="image/*" disabled>
    <img id="image-preview" src="" alt="Din bild">
    
    <div id="result-area" class="result-area">
        <span class="label-name" id="label-text">Analyserar...</span>
        <span class="confidence-val" id="confidence-text"></span>
    </div>
</div>

<script>
    let model;
    // Standardordning för blom-dataset (Daisy, Dandelion, Rose, Sunflower, Tulip)
    const LABELS = ['Daisy', 'Dandelion', 'Rose', 'Sunflower', 'Tulip'];

    async function init() {
        const status = document.getElementById('status');
        try {
            // 1. Hämta model.json som råtext
            const response = await fetch('tfjs_model/model.json');
            let modelConfigText = await response.text();

            // 2. Fixa Keras 3 -> TFJS inkompatibilitet genom att ersätta batch_shape
            // Detta löser felet "InputLayer should be passed either a batchInputShape or an inputShape"
            modelConfigText = modelConfigText.replace(/"batch_shape":/g, '"batchInputShape":');

            // 3. Konvertera tillbaka till objekt för att fixa sökvägar till bin-filerna
            const modelConfig = JSON.parse(modelConfigText);
            
            // Vi måste lägga till mappnamnet i sökvägen för varje shard/viktfil
            if (modelConfig.weightsManifest) {
                modelConfig.weightsManifest.forEach(manifest => {
                    manifest.paths = manifest.paths.map(path => 'tfjs_model/' + path);
                });
            }

            // 4. Skapa en temporär URL för den modifierade konfigurationen och ladda modellen
            const blob = new Blob([JSON.stringify(modelConfig)], { type: 'application/json' });
            const modelUrl = URL.createObjectURL(blob);
            
            model = await tf.loadLayersModel(modelUrl);
            
            status.innerText = "✅ Modellen är inläst och redo!";
            document.getElementById('image-upload').disabled = false;
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Fel vid laddning: " + err.message;
        }
    }

    const upload = document.getElementById('image-upload');
    const preview = document.getElementById('image-preview');
    const resultArea = document.getElementById('result-area');

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.style.display = 'block';
            preview.onload = () => runInference();
        };
        reader.readAsDataURL(file);
    });

    async function runInference() {
        if (!model) return;

        // Förbered bilden
        const tensor = tf.tidy(() => {
            const img = tf.browser.fromPixels(preview)
                .resizeNearestNeighbor([224, 224])
                .toFloat();
            
            // Normalisering enligt MobileNetV2 (-1 till 1)
            const offset = tf.scalar(127.5);
            return img.sub(offset).div(offset).expandDims(0);
        });

        const predictions = await model.predict(tensor).data();
        tensor.dispose();

        // Hitta högsta sannolikhet
        const maxScore = Math.max(...predictions);
        const classIdx = predictions.indexOf(maxScore);
        const flower = LABELS[classIdx];

        updateUI(flower, maxScore);
    }

    function updateUI(flower, confidence) {
        const labelText = document.getElementById('label-text');
        const confText = document.getElementById('confidence-text');
        
        resultArea.style.display = 'block';
        
        const isSecure = confidence >= 0.75;
        resultArea.className = isSecure ? 'result-area saker' : 'result-area osaker';
        
        labelText.innerText = isSecure ? flower : "Osäker";
        confText.innerText = `Sannolikhet: ${(confidence * 100).toFixed(1)}% (${isSecure ? 'Säker' : 'Låg tillförlitlighet'})`;
    }

    init();
</script>

</body>
</html>
