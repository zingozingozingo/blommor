<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blomsterigenkänning AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f4f8; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        #image-preview { max-width: 100%; height: auto; margin-top: 15px; border-radius: 4px; display: none; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; }
        .saker { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .osaker { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #status { margin-bottom: 10px; color: #666; }
        input[type="file"] { margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Identifiera blommor</h1>
    <p id="status">Laddar AI-modell...</p>
    
    <input type="file" id="image-selector" accept="image/*" disabled>
    <br>
    <img id="image-preview" src="#" alt="Förhandsvisning">
    
    <div id="result-container" class="result-box" style="display: none;">
        <div id="prediction-text"></div>
        <div id="confidence-text"></div>
    </div>
</div>

<script>
    let model;
    const LABELS = ['Daisy', 'Dandelion', 'Rose', 'Sunflower', 'Tulip'];

    async function loadModel() {
        try {
            await tf.ready();
            const modelUrl = 'tfjs_model/model.json';
            
            // 1. Hämta JSON-filen manuellt
            const response = await fetch(modelUrl);
            const modelJson = await response.json();

            // 2. Tvinga fram rätt format på InputLayer
            if (modelJson.modelTopology && modelJson.modelTopology.model_config) {
                const config = modelJson.modelTopology.model_config.config;
                let layers = config.layers;

                // Om det är en Sequential-modell (vilket din är)
                if (layers && layers.length > 0) {
                    const firstLayer = layers[0];
                    
                    // Om första lagret saknar batchInputShape, lägg till det manuellt
                    if (firstLayer.class_name === "InputLayer") {
                        const batchShape = firstLayer.config.batch_shape || [null, 224, 224, 3];
                        firstLayer.config.batchInputShape = batchShape;
                    } 
                    // Ibland saknas InputLayer helt och ligger som metadata i det första "riktiga" lagret
                    else if (!firstLayer.config.batchInputShape) {
                        firstLayer.config.batchInputShape = [null, 224, 224, 3];
                    }
                }
            }

            // 3. Ladda modellen från det modifierade objektet
            model = await tf.loadLayersModel(tf.io.fromMemory(modelJson));
            
            document.getElementById('status').innerText = 'Modellen är redo!';
            document.getElementById('image-selector').disabled = false;
        } catch (error) {
            console.error("Fullständigt felmeddelande:", error);
            document.getElementById('status').innerText = 'Fel: ' + error.message;
        }
    }

    // --- Samma logik för bildhantering som tidigare ---
    const imageSelector = document.getElementById('image-selector');
    const imagePreview = document.getElementById('image-preview');

    imageSelector.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                imagePreview.onload = () => predict();
            };
            reader.readAsDataURL(file);
        }
    });

    async function predict() {
        if (!model) return;

        const tensor = tf.tidy(() => {
            return tf.browser.fromPixels(imagePreview)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .div(tf.scalar(127.5))
                .sub(tf.scalar(1.0))
                .expandDims(0);
        });

        const prediction = await model.predict(tensor).data();
        tensor.dispose();
        
        const maxConfidence = Math.max(...prediction);
        const classIndex = prediction.indexOf(maxConfidence);
        displayResult(LABELS[classIndex], maxConfidence);
    }

    function displayResult(label, confidence) {
        const resultContainer = document.getElementById('result-container');
        resultContainer.style.display = 'block';
        document.getElementById('prediction-text').innerText = `Resultat: ${label}`;
        
        const isSaker = confidence >= 0.75;
        resultContainer.className = `result-box ${isSaker ? 'saker' : 'osaker'}`;
        document.getElementById('confidence-text').innerText = 
            `Status: ${isSaker ? 'Säker' : 'Osäker'} (${(confidence * 100).toFixed(1)}%)`;
    }

    loadModel();
</script>
</body>
</html>
