<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blomsterigenkänning AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f4f8; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        #image-preview { max-width: 100%; height: auto; margin-top: 15px; border-radius: 4px; display: none; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; font-size: 1.1em; }
        .saker { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .osaker { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #status { margin-bottom: 10px; color: #666; font-style: italic; }
        input[type="file"] { margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Identifiera blommor</h1>
    <p id="status">Laddar AI-modell och korrigerar konfiguration...</p>
    
    <input type="file" id="image-selector" accept="image/*" disabled>
    <br>
    <img id="image-preview" src="#" alt="Förhandsvisning">
    
    <div id="result-container" class="result-box" style="display: none;">
        <div id="prediction-text"></div>
        <div id="confidence-text"></div>
    </div>
</div>

<script>
    let model;
    // Etiketterna i alfabetisk ordning
    const LABELS = ['Daisy', 'Dandelion', 'Rose', 'Sunflower', 'Tulip'];

    async function loadModel() {
        try {
            const modelUrl = 'tfjs_model/model.json';
            
            // 1. Hämta JSON-filen som ren text
            const response = await fetch(modelUrl);
            const jsonText = await response.text();
            
            // 2. Byt ut *alla* felaktiga "batch_shape" mot "batchInputShape" (global sök och ersätt)
            const fixedJsonText = jsonText.replace(/"batch_shape":/g, '"batchInputShape":');
            
            // 3. Gör om till ett objekt för att uppdatera sökvägarna till vikterna (.bin-filerna)
            const modelManifest = JSON.parse(fixedJsonText);
            const pathPrefix = 'tfjs_model/'; // Mappen där filerna ligger
            
            if (modelManifest.weightsManifest) {
                modelManifest.weightsManifest.forEach(group => {
                    // Berätta exakt var .bin-filerna ligger så TF.js hittar dem
                    group.paths = group.paths.map(path => pathPrefix + path);
                });
            }
            
            // 4. Skapa en temporär fil i webbläsarens minne med de korrekta datan
            const blob = new Blob([JSON.stringify(modelManifest)], { type: 'application/json' });
            const blobUrl = URL.createObjectURL(blob);
            
            // 5. Ladda modellen via den säkra temporära URL:en
            model = await tf.loadLayersModel(blobUrl);
            
            document.getElementById('status').innerText = 'Modellen är redo! Välj en bild.';
            document.getElementById('image-selector').disabled = false;
        } catch (error) {
            console.error("Modellfel:", error);
            document.getElementById('status').innerText = 'Ett fel uppstod: ' + error.message;
        }
    }

    const imageSelector = document.getElementById('image-selector');
    const imagePreview = document.getElementById('image-preview');

    // Hantera bilduppladdning och förhandsvisning
    imageSelector.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                // Starta prediktionen när bilden är helt inladdad
                imagePreview.onload = () => predict();
            };
            reader.readAsDataURL(file);
        }
    });

    // Kör modellen på bilden
    async function predict() {
        if (!model) return;
        document.getElementById('status').innerText = 'Analyserar bild...';

        // Preprocessing: Gör om bilden till en tensor (MobileNetV2-standard)
        const tensor = tf.tidy(() => {
            return tf.browser.fromPixels(imagePreview)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .div(tf.scalar(127.5)) // Normalisera till mellan -1 och 1
                .sub(tf.scalar(1.0))
                .expandDims(0);
        });

        const prediction = await model.predict(tensor).data();
        tensor.dispose(); // Frigör minne
        
        // Hitta den blomma med högst poäng
        const maxConfidence = Math.max(...prediction);
        const classIndex = prediction.indexOf(maxConfidence);
        const label = LABELS[classIndex];

        displayResult(label, maxConfidence);
        document.getElementById('status').innerText = 'Analys klar.';
    }

    // Visa resultatet i gränssnittet
    function displayResult(label, confidence) {
        const resultContainer = document.getElementById('result-container');
        const predText = document.getElementById('prediction-text');
        const confText = document.getElementById('confidence-text');

        resultContainer.style.display = 'block';
        predText.innerText = `Blomma: ${label}`;
        
        // Formatera sannolikheten som procent (t.ex. 85.2%)
        const percentage = (confidence * 100).toFixed(1);

        // Säker eller osäker (gräns vid 0.75)
        if (confidence >= 0.75) {
            resultContainer.className = 'result-box saker';
            confText.innerText = `Säker (${percentage}%)`;
        } else {
            resultContainer.className = 'result-box osaker';
            confText.innerText = `Osäker (${percentage}%)`;
        }
    }

    // Starta laddningen av modellen när sidan laddas
    loadModel();
</script>

</body>
</html>
